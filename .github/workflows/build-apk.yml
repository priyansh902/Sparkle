name: Build Android APK

on:
  push:
    branches: [ main, master, android-ui ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      - name: Create firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return const FirebaseOptions(
                apiKey: "${{ secrets.FIREBASE_API_KEY }}",
                appId: "${{ secrets.FIREBASE_APP_ID }}",
                messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
                projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
                authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
                storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              );
            }
          }
          EOF
      
      # Debug: Print the contents of firebase_options.dart to verify it was created correctly
      - name: Verify firebase_options.dart
        run: cat lib/firebase_options.dart
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-lite-apk
          path: build/app/outputs/flutter-apk/app-release.apk