  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #7B61FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <!-- Firebase Configuration -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getAuth } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBjB7C6SCwBtd0AtagVy4NLCbjqa4se0Y4",
      authDomain: "sparkle-lite-78f1c.firebaseapp.com",
      projectId: "sparkle-lite-78f1c",
      storageBucket: "sparkle-lite-78f1c.firebasestorage.app",
      messagingSenderId: "655837677296",
      appId: "1:655837677296:web:7b8130c0525d21b466e435"
    };

    try {
      const app = initializeApp(firebaseConfig);
      window.firebaseApp = app;

      console.log("✅ Firebase initialized successfully");
    } catch (error) {
      console.error("❌ Firebase initialization error:", error);
    }
  </script>
